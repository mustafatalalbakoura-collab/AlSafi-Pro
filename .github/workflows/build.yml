name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build
        run: |
          pip install flet-cli yfinance pandas-ta
          # الطريقة التقليدية والمضمونة للتثبيت التلقائي
          flet build apk --assume-yes

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AlSafi-Pro-App
          path: build/apk/*.apk
          
