name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Application
        run: |
          pip install flet-cli yfinance pandas-ta
          # السر هنا: أمر واحد بسيط ومباشر مع printf لإرسال "y" يدوياً
          # دون استخدام أي Flags تسبب أخطاء unrecognized arguments
          printf 'y\n' | flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlSafi-Pro-App
          path: "**/build/apk/*.apk"
          
