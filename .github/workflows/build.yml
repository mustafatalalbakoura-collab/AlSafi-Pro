name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Flet and Dependencies
        run: |
          pip install flet-cli yfinance pandas-ta

      - name: Pre-configure Flet
        run: |
          # إجبار Flet على تحميل وتثبيت Flutter SDK في وضع صامت تماماً
          flet config --enable-android true

      - name: Build Android APK
        run: |
          # استخدام printf لضمان إرسال حرف 'y' متبوعاً بـ Enter لأي سؤال يظهر فجأة
          printf 'y\n' | flet build apk --no-interactive --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlSafi-Pro-App
          path: "**/build/apk/*.apk"
          
