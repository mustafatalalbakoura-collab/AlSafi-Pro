name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Application
        run: |
          pip install flet-cli yfinance pandas-ta
          # السر هنا: نرسل ضغطة Enter أوتوماتيكياً (بواسطة printf) للأمر 
          # لتجاوز أي سؤال يطرحه Flet عن إصدار Flutter
          printf 'y\n' | flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlSafi-Pro-App
          path: "**/build/apk/*.apk"
          
