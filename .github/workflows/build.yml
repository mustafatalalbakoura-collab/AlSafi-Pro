name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build
        run: |
          # 1. تثبيت flet-cli فقط هنا
          pip install flet-cli
          
          # 2. بناء التطبيق وتمرير المكتبات كأوامر مباشرة 
          # هذا يتجاوز أي خطأ في ملف requirements.txt
          flet build apk --no-interactive --include-packages flet yfinance pandas-ta
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AlSafi-Pro-App
          path: "build/apk/*.apk"
          
