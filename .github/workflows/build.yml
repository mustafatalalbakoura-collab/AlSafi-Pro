name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Flet CLI
        run: |
          pip install flet-cli yfinance pandas-ta

      - name: Setup Flutter Environment
        run: |
          # هذه الخطوة هي التي ستحل المشكلة؛ نقوم بتحميل Flutter مسبقاً يدوياً
          git clone https://github.com/flutter/flutter.git -b stable --depth 1
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH
          export PATH="$PATH:$GITHUB_WORKSPACE/flutter/bin"
          flutter doctor

      - name: Build Android APK
        run: |
          # استخدام --no-interactive يمنع Flet من طرح أي أسئلة
          flet build apk --no-interactive

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlSafi-Pro-App
          path: "**/build/apk/*.apk"
        uses: actions/upload-artifact@v4
        with:
          name: AlSafi-Pro-App
          path: "**/build/apk/*.apk"
